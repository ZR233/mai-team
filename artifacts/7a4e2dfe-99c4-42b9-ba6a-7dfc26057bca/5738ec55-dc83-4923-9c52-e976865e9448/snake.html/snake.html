<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    user-select: none;
  }
  .game-container {
    background: #16213e;
    border-radius: 16px;
    padding: 30px 40px 25px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    text-align: center;
  }
  h1 {
    color: #4ade80;
    font-size: 28px;
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  .score-bar {
    color: #e2e8f0;
    font-size: 18px;
    margin-bottom: 12px;
  }
  .score-bar span { color: #fbbf24; font-weight: bold; font-size: 22px; }
  .canvas-wrapper {
    position: relative;
    display: inline-block;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: inset 0 0 0 2px #0f3460;
  }
  canvas {
    display: block;
    background: #0f3460;
    width: 400px;
    height: 400px;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.65);
    color: #e2e8f0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .overlay .title { font-size: 28px; font-weight: bold; margin-bottom: 8px; }
  .overlay .sub { font-size: 16px; color: #94a3b8; }
  .overlay .sub .highlight { color: #fbbf24; font-weight: bold; }
  .controls {
    margin-top: 14px;
    color: #94a3b8;
    font-size: 14px;
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .controls kbd {
    background: #1e293b;
    color: #e2e8f0;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 13px;
    border: 1px solid #334155;
  }
  .btn {
    margin-top: 12px;
    background: #4ade80;
    color: #0f172a;
    border: none;
    padding: 10px 32px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:hover { background: #22c55e; }
  .btn:active { transform: scale(0.96); }
  .footer {
    margin-top: 10px;
    color: #475569;
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="game-container">
  <h1>🐍 贪吃蛇</h1>
  <div class="score-bar">得分：<span id="scoreDisplay">0</span></div>
  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="overlay show" id="overlay">
      <div class="title" id="overlayTitle">🐍 贪吃蛇</div>
      <div class="sub" id="overlaySub">按 <kbd>空格</kbd> 开始游戏</div>
    </div>
  </div>
  <div class="controls">
    <span><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 控制方向</span>
    <span><kbd>空格</kbd> 开始 / 重新开始</span>
  </div>
  <button class="btn" id="restartBtn">🔄 重新开始</button>
  <div class="footer">每个食物 +1 分 · 撞墙或撞到自己则游戏结束</div>
</div>

<script>
(function(){
  // ----- 常量 -----
  const COLS = 20;
  const ROWS = 20;
  const CELL_SIZE = 20;        // px
  const TICK_MS = 150;

  // ----- DOM -----
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreSpan = document.getElementById('scoreDisplay');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlaySub = document.getElementById('overlaySub');
  const restartBtn = document.getElementById('restartBtn');

  // ----- 状态 -----
  const State = { READY: 0, PLAYING: 1, GAME_OVER: 2 };
  let state = State.READY;
  let snake = [];          // [{x,y}, ...]  头在索引0
  let food = { x: 0, y: 0 };
  let score = 0;
  let direction = { x: 1, y: 0 };     // 当前实际移动方向
  let nextDirection = { x: 1, y: 0 }; // 下一帧方向
  let dirQueue = [];       // 方向队列
  let timerId = null;

  // ----- 工具函数 -----
  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  // 比较两个坐标是否相等
  function eq(a, b) { return a.x === b.x && a.y === b.y; }

  // 获取所有空格
  function getEmptyCells() {
    const occupied = new Set(snake.map(c => `${c.x},${c.y}`));
    const cells = [];
    for (let x = 0; x < COLS; x++) {
      for (let y = 0; y < ROWS; y++) {
        if (!occupied.has(`${x},${y}`)) cells.push({ x, y });
      }
    }
    return cells;
  }

  // 生成新食物
  function spawnFood() {
    const empty = getEmptyCells();
    if (empty.length === 0) return false;  // 蛇占满全屏
    food = empty[randInt(0, empty.length - 1)];
    return true;
  }

  // ----- 游戏逻辑 -----
  function initGame() {
    // 蛇：长度为3，水平放置于第10行（y=9），从第4列到第6列（x=3..5），头在右（x=5）
    snake = [
      { x: 5, y: 9 },
      { x: 4, y: 9 },
      { x: 3, y: 9 }
    ];
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    dirQueue = [];
    score = 0;
    updateScore();
    spawnFood();
  }

  function startGame() {
    initGame();
    state = State.PLAYING;
    overlay.classList.remove('show');
    if (timerId) { clearInterval(timerId); timerId = null; }
    timerId = setInterval(tick, TICK_MS);
  }

  function gameOver() {
    state = State.GAME_OVER;
    if (timerId) { clearInterval(timerId); timerId = null; }
    overlayTitle.textContent = '💀 游戏结束';
    overlaySub.innerHTML = `最终得分：<span class="highlight">${score}</span>　按 <kbd>空格</kbd> 重新开始`;
    overlay.classList.add('show');
  }

  // 核心 tick
  function tick() {
    if (state !== State.PLAYING) return;

    // 消费方向队列
    if (dirQueue.length > 0) {
      const d = dirQueue.shift();
      // 检查是否与当前方向相反
      if (d.x !== -direction.x || d.y !== -direction.y) {
        nextDirection = d;
      }
    }

    direction = { x: nextDirection.x, y: nextDirection.y };

    // 计算新蛇头
    const head = snake[0];
    const newHead = { x: head.x + direction.x, y: head.y + direction.y };

    // 检测撞墙
    if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
      gameOver();
      return;
    }

    // 检测撞自身（检查新头是否在身体上，注意：如果吃食物且食物刚好在尾部则不判撞）
    const willEat = food && eq(newHead, food);
    // 碰撞检测时，如果不吃食物，要去掉尾部后再检测；如果吃食物，保留尾部
    let bodyToCheck = snake;
    if (!willEat) {
      bodyToCheck = snake.slice(0, -1);  // 去掉尾部
    }
    for (const seg of bodyToCheck) {
      if (eq(newHead, seg)) {
        gameOver();
        return;
      }
    }

    // 移动
    snake.unshift(newHead);

    if (willEat) {
      // 吃到了：不弹尾部，加分，生成新食物
      score += 1;
      updateScore();
      if (!spawnFood()) {
        // 蛇占满全屏 → 胜利！
        if (timerId) { clearInterval(timerId); timerId = null; }
        state = State.GAME_OVER;
        overlayTitle.textContent = '🎉 你赢了！';
        overlaySub.innerHTML = `满分！<span class="highlight">${score}</span>　按 <kbd>空格</kbd> 再来一局`;
        overlay.classList.add('show');
        return;
      }
    } else {
      // 没吃到：弹出尾部
      snake.pop();
    }

    draw();
  }

  // ----- 输入处理 -----
  function handleKey(e) {
    const key = e.key;
    // 空格：开始 / 重新开始
    if (key === ' ' || key === 'Spacebar') {
      e.preventDefault();
      if (state === State.READY || state === State.GAME_OVER) {
        startGame();
      }
      return;
    }

    if (state !== State.PLAYING) return;

    let d = null;
    switch (key) {
      case 'ArrowUp':    case 'w': case 'W': d = { x:  0, y: -1 }; break;
      case 'ArrowDown':  case 's': case 'S': d = { x:  0, y:  1 }; break;
      case 'ArrowLeft':  case 'a': case 'A': d = { x: -1, y:  0 }; break;
      case 'ArrowRight': case 'd': case 'D': d = { x:  1, y:  0 }; break;
    }

    if (d) {
      e.preventDefault();
      // 方向队列最多保留3个，防堆积
      if (dirQueue.length < 3) {
        dirQueue.push(d);
      }
    }
  }

  // ----- 渲染 -----
  function draw() {
    ctx.clearRect(0, 0, 400, 400);

    // 绘制网格（淡线）
    ctx.strokeStyle = '#1e3a5f';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= COLS; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL_SIZE, 0);
      ctx.lineTo(i * CELL_SIZE, 400);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL_SIZE);
      ctx.lineTo(400, i * CELL_SIZE);
      ctx.stroke();
    }

    // 绘制食物（红色圆形）
    if (food) {
      const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
      const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
      ctx.beginPath();
      ctx.arc(fx, fy, CELL_SIZE / 2 - 2, 0, Math.PI * 2);
      ctx.fillStyle = '#ef4444';
      ctx.fill();
      // 高光
      ctx.beginPath();
      ctx.arc(fx - 3, fy - 3, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#fca5a5';
      ctx.fill();
    }

    // 绘制蛇
    for (let i = 0; i < snake.length; i++) {
      const seg = snake[i];
      const x = seg.x * CELL_SIZE;
      const y = seg.y * CELL_SIZE;
      const pad = i === 0 ? 1 : 2;
      const radius = i === 0 ? 4 : 3;

      // 圆角方块
      const w = CELL_SIZE - pad * 2;
      ctx.fillStyle = i === 0 ? '#16a34a' : '#4ade80';
      ctx.beginPath();
      ctx.roundRect(x + pad, y + pad, w, w, radius);
      ctx.fill();

      // 蛇头眼睛
      if (i === 0) {
        ctx.fillStyle = '#fff';
        const eyeOff = 4;
        let ex1, ey1, ex2, ey2;
        if (direction.x === 1) {
          ex1 = x + 13; ey1 = y + 4; ex2 = x + 13; ey2 = y + 12;
        } else if (direction.x === -1) {
          ex1 = x + 5;  ey1 = y + 4; ex2 = x + 5;  ey2 = y + 12;
        } else if (direction.y === -1) {
          ex1 = x + 4;  ey1 = y + 5; ex2 = x + 12; ey2 = y + 5;
        } else {
          ex1 = x + 4;  ey1 = y + 13; ex2 = x + 12; ey2 = y + 13;
        }
        ctx.beginPath();
        ctx.arc(ex1, ey1, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex2, ey2, 2, 0, Math.PI * 2);
        ctx.fill();
        // 瞳孔
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(ex1 + direction.x, ey1 + direction.y, 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex2 + direction.x, ey2 + direction.y, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Canvas roundRect polyfill（部分浏览器需要）
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (typeof r === 'number') r = [r];
      const tl = r[0] || 0;
      this.moveTo(x + tl, y);
      this.arcTo(x + w, y, x + w, y + h, tl);
      this.arcTo(x + w, y + h, x, y + h, tl);
      this.arcTo(x, y + h, x, y, tl);
      this.arcTo(x, y, x + w, y, tl);
      this.closePath();
      return this;
    };
  }

  // ----- UI 更新 -----
  function updateScore() {
    scoreSpan.textContent = score;
  }

  // ----- 重置状态（READY）-----
  function setReady() {
    if (timerId) { clearInterval(timerId); timerId = null; }
    state = State.READY;
    initGame();
    draw();
    overlayTitle.textContent = '🐍 贪吃蛇';
    overlaySub.innerHTML = '按 <kbd>空格</kbd> 开始游戏';
    overlay.classList.add('show');
  }

  // ----- 事件绑定 -----
  document.addEventListener('keydown', handleKey);
  restartBtn.addEventListener('click', () => {
    if (state === State.PLAYING) {
      if (timerId) { clearInterval(timerId); timerId = null; }
    }
    setReady();
  });

  // 页面失去焦点时停止方向键页面滚动
  window.addEventListener('keydown', (e) => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
      e.preventDefault();
    }
  }, { passive: false });

  // ----- 启动 -----
  setReady();
})();
</script>
</body>
</html>
