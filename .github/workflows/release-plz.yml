name: Release-plz

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: read
    outputs:
      relay_released: ${{ steps.relay-release.outputs.released }}
      relay_tag: ${{ steps.relay-release.outputs.tag }}
      server_released: ${{ steps.server-release.outputs.released }}
      server_tag: ${{ steps.server-release.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read relay release output
        id: relay-release
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        shell: bash
        run: |
          set -euo pipefail
          relay_release="$(jq -c 'map(select(.package_name == "mai-relay")) | first // empty' <<<"${RELEASES:-[]}")"
          if [[ -z "$relay_release" ]]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "tag=$(jq -r '.tag' <<<"$relay_release")" >> "$GITHUB_OUTPUT"

      - name: Read server release output
        id: server-release
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        shell: bash
        run: |
          set -euo pipefail
          server_release="$(jq -c 'map(select(.package_name == "mai-server")) | first // empty' <<<"${RELEASES:-[]}")"
          if [[ -z "$server_release" ]]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "tag=$(jq -r '.tag' <<<"$server_release")" >> "$GITHUB_OUTPUT"

      - name: Build relay
        if: steps.relay-release.outputs.released == 'true'
        run: cargo build --locked -p mai-relay --bin mai-relay --release

      - name: Package relay
        if: steps.relay-release.outputs.released == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/mai-relay dist/mai-relay
          tar -C dist -czf mai-relay-x86_64-unknown-linux-gnu.tar.gz mai-relay
          sha256sum mai-relay-x86_64-unknown-linux-gnu.tar.gz > mai-relay-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Upload relay release assets
        if: steps.relay-release.outputs.released == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.relay-release.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            mai-relay-x86_64-unknown-linux-gnu.tar.gz
            mai-relay-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Build server
        if: steps.server-release.outputs.released == 'true'
        run: cargo build --locked -p mai-server --bin mai-server --release

      - name: Package server
        if: steps.server-release.outputs.released == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/mai-server dist/mai-server
          tar -C dist -czf mai-server-x86_64-unknown-linux-gnu.tar.gz mai-server
          sha256sum mai-server-x86_64-unknown-linux-gnu.tar.gz > mai-server-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Upload server release assets
        if: steps.server-release.outputs.released == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.server-release.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            mai-server-x86_64-unknown-linux-gnu.tar.gz
            mai-server-x86_64-unknown-linux-gnu.tar.gz.sha256

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # release-plz 的 git_only 工作区仍会运行 cargo package，无法处理未发布的 Git 依赖。
      # 固定到上游修复提交；正式版本包含该修复后可恢复使用 release-plz/action。
      - name: Install release-plz with git-only workspace fix
        run: >-
          cargo install
          --git https://github.com/structured-world/release-plz.git
          --rev e8ca8da97dc8f472820a67eece651604887b1c7d
          --locked
          release-plz

      - name: Configure release commit author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release-plz
        shell: bash
        env:
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          real_cargo="$(command -v cargo)"
          REAL_CARGO="$real_cargo" \
            PATH="$GITHUB_WORKSPACE/.github/release-plz:$PATH" \
            release-plz release-pr \
              --repo-url "https://github.com/$GITHUB_REPOSITORY" \
              --forge github \
              --output json
