name: Build Relay Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "GitHub release tag to upload relay assets to, for example mai-relay-v0.1.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  relay-linux-x86-64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build relay
        run: cargo build --locked -p mai-relay --bin mai-relay --release

      - name: Package relay
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/mai-relay dist/mai-relay
          tar -C dist -czf mai-relay-x86_64-unknown-linux-gnu.tar.gz mai-relay
          sha256sum mai-relay-x86_64-unknown-linux-gnu.tar.gz > mai-relay-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          fail_on_unmatched_files: true
          files: |
            mai-relay-x86_64-unknown-linux-gnu.tar.gz
            mai-relay-x86_64-unknown-linux-gnu.tar.gz.sha256
