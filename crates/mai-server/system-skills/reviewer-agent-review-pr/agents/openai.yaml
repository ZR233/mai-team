interface:
  display_name: Reviewer Agent — Review PR
  short_description: Script-assisted single-PR review with impact, CI, prior-comment, validation, and design-risk checks
  default_prompt: As a reviewer agent, review only the target pull request named by Mai. Use the bundled helper, the gh sidecar, and the isolated agent workspace clone to prepare and validate that PR; analyze existing-feature impact, CI status, previous review comments, concurrency/design risks, and then submit the GitHub review.
policy:
  allow_implicit_invocation: false
